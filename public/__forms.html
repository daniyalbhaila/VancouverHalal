<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="suggest-spot" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="suggest-spot" />
      <input name="bot-field" />
      <input name="name" type="text" />
      <input name="google_maps_url" type="text" />
      <input name="address" type="text" />
      <input name="cuisine" type="text" />
      <input name="halal_status_claim" type="text" />
      <input name="certification_body" type="text" />
      <input name="certification_link" type="text" />
      <input name="notes" type="text" />
      <input name="submitter_email" type="text" />
    </form>

    <form name="report-issue" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="report-issue" />
      <input name="bot-field" />
      <input name="restaurant_name" type="text" />
      <input name="restaurant_slug" type="text" />
      <input name="issue_type" type="text" />
      <input name="details" type="text" />
      <input name="reporter_email" type="text" />
    </form>
  </body>
</html>
